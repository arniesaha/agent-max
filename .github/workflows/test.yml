name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: arniesaha/agentweave
          path: ../agentweave
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: cd ../agentweave/sdk/js && npm install && npm run build
      - run: npm ci
      - run: npm test -- --verbose
